<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Study Timer</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', system-ui, sans-serif; }
    .timer-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Noto Sans Mono", monospace; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Study Timer</h1>
        <p class="text-sm text-slate-500">과목별 타이머와 일별 통계를 빠르게 확인하세요</p>
      </div>
      <div class="text-right">
        <div class="inline-block text-sm text-white bg-gradient-to-r from-blue-600 to-cyan-500 px-4 py-2 rounded-lg shadow">
          <span id="today-total" class="font-medium timer-mono">오늘 총 공부 시간: 00:00:00</span>
        </div>
      </div>
    </header>

    <section class="bg-white rounded-xl shadow p-4 mb-6">
      <div class="flex gap-3">
        <input id="subject-input" class="flex-1 border border-slate-200 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-300" placeholder="과목명 입력 (예: 수학)" />
        <button id="add-subject" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">추가</button>
      </div>
    </section>

    <section id="subjects" class="space-y-3"></section>

    <footer class="mt-8 text-sm text-slate-500">
      <div>데이터는 브라우저 LocalStorage에 저장됩니다.</div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
