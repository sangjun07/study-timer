<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Study Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Study Timer</h1>
    <div id="today-total">오늘 총 공부 시간: 00:00:00</div>
  </header>

  <section class="controls">
    <input id="subject-input" placeholder="과목명 입력 (예: 한국문학의이해)" />
    <button id="add-subject">추가</button>
  </section>

  <section id="subjects"></section>

  <script src="app.js"></script>
</body>
</html>
