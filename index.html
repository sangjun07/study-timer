<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Study Timer - PRD</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  <div class="max-w-5xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold">Study Timer</h1>
        <p class="text-sm text-slate-500">과목별 타이머와 일/주/월 통계 대시보드</p>
      </div>
      <div class="text-right">
        <div class="inline-block text-sm text-white bg-gradient-to-r from-blue-600 to-cyan-500 px-4 py-2 rounded-lg shadow">
          <span id="today-total" class="font-medium">오늘 총 공부 시간: 00:00:00</span>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="mb-4">
      <button id="tab-home" class="tab-btn px-4 py-2 rounded-l-md bg-white border border-slate-200">Home</button>
      <button id="tab-stats" class="tab-btn px-4 py-2 rounded-r-md bg-white border border-slate-200">Stats</button>
    </nav>

    <!-- HOME -->
    <main id="view-home">
      <section class="bg-white rounded-xl shadow p-4 mb-6">
        <div class="flex gap-3">
          <input id="subject-input" class="flex-1 border border-slate-200 rounded-md px-3 py-2" placeholder="과목명 입력 (예: 국어, 수학, 코딩)" />
          <button id="add-subject" class="bg-blue-600 text-white px-4 py-2 rounded-md">추가</button>
        </div>
      </section>

      <section id="subjects" class="space-y-3"></section>
    </main>

    <!-- STATS -->
    <main id="view-stats" class="hidden">
      <section class="bg-white rounded-xl shadow p-4 mb-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold">대시보드</h2>
          <div class="flex items-center gap-3">
            <label class="text-sm text-slate-500">기간:</label>
            <select id="stats-range" class="border rounded px-2 py-1">
              <option value="day">오늘</option>
              <option value="week">이번 주 (최근 7일)</option>
              <option value="month">이번 달</option>
              <option value="all" selected>전체</option>
            </select>
            <button id="refresh-stats" class="bg-slate-600 text-white px-3 py-1 rounded">갱신</button>
          </div>
        </div>

        <div class="mb-4">
          <div class="text-sm text-slate-600 mb-2">과목별 총합 (선택한 기간)</div>
          <canvas id="stats-chart" height="120"></canvas>
        </div>

        <div class="overflow-x-auto mb-4">
          <table class="min-w-full text-left">
            <thead>
              <tr class="text-sm text-slate-500">
                <th class="py-2 pr-4">과목</th>
                <th class="py-2 pr-4">총 시간</th>
                <th class="py-2 pr-4">기록 수</th>
                <th class="py-2 pr-4">상세보기</th>
              </tr>
            </thead>
            <tbody id="stats-table-body"></tbody>
          </table>
        </div>
      </section>

      <section class="bg-white rounded-xl shadow p-4">
        <h3 class="font-medium mb-2">날짜별 합계 (과목 선택)</h3>
        <div class="flex gap-3 items-center mb-3">
          <select id="subject-select" class="border rounded px-2 py-1">
            <option value="">과목 선택</option>
          </select>
          <button id="refresh-subject-chart" class="bg-slate-600 text-white px-3 py-1 rounded">갱신</button>
        </div>
        <canvas id="subject-chart" height="120"></canvas>
      </section>
    </main>

    <footer class="mt-8 text-sm text-slate-500">
      <div>데이터는 브라우저 LocalStorage에 저장됩니다. (새로고침/재접속 시 유지)</div>
    </footer>
  </div>

  <!-- 상세 모달 -->
  <div id="detail-modal" class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50">
    <div class="bg-white rounded-lg shadow-lg w-11/12 max-w-2xl p-4">
      <div class="flex justify-between items-center mb-3">
        <h4 id="modal-title" class="font-semibold">상세 통계</h4>
        <button id="modal-close" class="text-slate-500">닫기</button>
      </div>
      <div id="modal-body">
        <div class="mb-3">
          <canvas id="modal-pie" height="160"></canvas>
        </div>
        <div id="modal-list" class="text-sm text-slate-600"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
